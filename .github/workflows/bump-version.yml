name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Get and calculate new version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $CURRENT_VERSION"

          # Normalize version to semver format (X.Y.Z)
          if [[ "$CURRENT_VERSION" =~ ^[0-9]+$ ]]; then
            NORMALIZED_VERSION="${CURRENT_VERSION}.0.0"
          elif [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            NORMALIZED_VERSION="${CURRENT_VERSION}.0"
          else
            NORMALIZED_VERSION=$(echo "$CURRENT_VERSION" | sed 's/-SNAPSHOT//')
          fi

          echo "Normalized version: $NORMALIZED_VERSION"

          IFS='.' read -ra VERSION_PARTS <<< "$NORMALIZED_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          case "${{ github.event.inputs.version_type }}" in
            "major")
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            "minor")
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            "patch")
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New version: $NEW_VERSION"

      - name: Update Maven version
        run: |
          mvn versions:set -DnewVersion=${{ env.NEW_VERSION }}
          mvn versions:commit

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Commit and tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pom.xml
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git tag "v${{ env.NEW_VERSION }}"
          git push origin main
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NEW_VERSION }}"
          name: "v${{ env.NEW_VERSION }}"
          files: target/discord-bot-${{ env.NEW_VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
