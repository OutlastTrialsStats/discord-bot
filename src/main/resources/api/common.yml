components:
  schemas:
    PlatformType:
      type: string
      enum:
        - STEAM
        - PLAYSTATION
        - XBOX
        - EPIC_GAMES
      description: Gaming platform

    StatisticType:
      type: string
      enum:
        - COMPLETED_TRIALS
        - REAGENTS_RELEASED
        - TRIALS_IN_HOURS
        - ESCALATION_PEAK
        - FAILED_TRIALS
        - DEATHS
        - PRESTIGE
        - STAMPS
        - EVENT_TOKENS
        - CHESS_WINS
        - CHESS_RATING
        - ARMWRESTLING_WINS
        - ARMWRESTLING_RATING
        - STROOP_RATING
        - TENNIS_WINS
        - TENNIS_RATING
        - INVASION_IMPOSTER_WON_MATCHES
        - INVASION_IMPOSTER_LOST_MATCHES
        - INVASION_REAGENT_WON_MATCHES
        - INVASION_REAGENT_LOST_MATCHES
      description: Type of statistic to use for ranking

    InvasionRanking:
      type: string
      enum:
        - UNRANKED
        - INITIATE_3
        - INITIATE_2
        - INITIATE_1
        - BRONZE_3
        - BRONZE_2
        - BRONZE_1
        - SILVER_3
        - SILVER_2
        - SILVER_1
        - GOLD_3
        - GOLD_2
        - GOLD_1
